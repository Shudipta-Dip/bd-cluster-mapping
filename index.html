<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangladesh Economic Clusters Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar — Filters Only -->
        <aside class="sidebar" id="sidebar">
            <header>
                <div class="header-row">
                    <div>
                        <h1>Economic Corridor</h1>
                        <p>Strategic Mapping of Investment Nodes</p>
                    </div>
                    <button class="theme-toggle" id="theme-toggle" title="Toggle Light/Dark Mode">
                        <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
            </header>

            <div class="filters-section">
                <h3>Layers</h3>
                <div class="filter-group">
                    <label class="toggle-container">
                        <input type="checkbox" id="toggle-clusters" checked>
                        <span class="checkmark cluster-check"></span>
                        Industrial Clusters
                    </label>
                    <label class="toggle-container">
                        <input type="checkbox" id="toggle-zones" checked>
                        <span class="checkmark zone-check"></span>
                        EZs / EPZs / Hi-Tech Parks
                    </label>
                    <label class="toggle-container">
                        <input type="checkbox" id="toggle-ports" checked>
                        <span class="checkmark port-check"></span>
                        Trade Ports
                    </label>
                    <label class="toggle-container">
                        <input type="checkbox" id="toggle-belts" checked>
                        <span class="checkmark belt-check"></span>
                        Economic Belts
                    </label>
                </div>

                <div class="filter-group">
                    <h4>RCA Filter <span class="rca-value" id="rca-display">≥ 0.00</span></h4>
                    <input type="range" id="rca-slider" min="0" max="17" step="0.1" value="0" class="rca-slider">
                    <div class="rca-range-labels">
                        <span>0</span>
                        <span>17</span>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="sector-header">
                        <h4>Sectors</h4>
                        <div class="sector-actions">
                            <button id="btn-select-all" class="sector-action-btn">Select All</button>
                            <button id="btn-clear-all" class="sector-action-btn">Clear All</button>
                        </div>
                    </div>
                    <div class="sector-filters" id="sector-filters"></div>
                </div>
            </div>

            <div class="legend-section">
                <h3>Legend</h3>
                <div class="legend-items">
                    <div class="legend-item"><span class="legend-dot" style="background:#8b5cf6;"></span> Cluster</div>
                    <div class="legend-item"><span class="legend-dot" style="background:#10b981;"></span> EZ/EPZ/HTP</div>
                    <div class="legend-item"><span class="legend-square" style="background:#f59e0b;"></span> Seaport</div>
                    <div class="legend-item"><span class="legend-dot" style="background:#fb923c;"></span> Land Port</div>
                    <div class="legend-item"><span class="legend-line" style="background:#ef4444;"></span> NW–D–SE Corridor</div>
                    <div class="legend-item"><span class="legend-line" style="background:#3b82f6;"></span> SW–D–NE Corridor</div>
                    <div class="legend-item"><span class="legend-line" style="background:#a855f7;"></span> Central Belt</div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <a href="report.html" class="report-link">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Full Analytical Study
                </a>
            </div>
        </aside>

        <!-- Map Container -->
        <main class="map-wrapper">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="bd_border.js"></script>
    <script src="map_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
